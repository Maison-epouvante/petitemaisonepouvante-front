# SonarCloud Configuration - Frontend
sonar.projectKey=maisonepouvante_front
sonar.organization=maisonepouvante

# Project Information
sonar.projectName=Frontend
sonar.projectVersion=1.0

# Source and Test Directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.sourceEncoding=UTF-8

# TypeScript/JavaScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.ts,**/*.test.tsx
sonar.test.exclusions=**/node_modules/**,**/dist/**

# Quality Gate
sonar.qualitygate.wait=false
